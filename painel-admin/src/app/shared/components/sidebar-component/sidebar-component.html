<aside class="w-64 bg-zinc-950 border-r border-zinc-800 flex flex-col z-20 shrink-0">
    <div class="p-8 border-b border-zinc-800">
        <h1 class="text-2xl font-black italic tracking-tighter text-white">
            btree<span class="text-[#ccf381]">_</span>
        </h1>
        <span class="text-[10px] font-mono text-zinc-500 uppercase tracking-widest block mt-1">Admin Panel v.0.4</span>
    </div>

    <nav class="flex-1 overflow-y-auto py-6 space-y-1">
        @for (item of mainNav; track item.route) {
        <a [routerLink]="item.route" routerLinkActive="border-[#ccf381] bg-zinc-900 text-[#ccf381]"
            [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }"
            class="w-full flex items-center gap-3 p-4 text-sm font-medium uppercase tracking-wider transition-all border-l-2 border-transparent text-zinc-500 hover:text-zinc-300 hover:bg-zinc-900/50">
            <svg class="w-[18px] h-[18px] shrink-0" fill="none" stroke="currentColor" stroke-width="2"
                viewBox="0 0 24 24">
                <path [attr.d]="iconPath(item.icon)" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            {{ item.label }}
        </a>
        }
    </nav>

    <div class="p-4 border-t border-zinc-800">
        <a routerLink="/settings" routerLinkActive="border-[#ccf381] bg-zinc-900 text-[#ccf381]"
            class="w-full flex items-center gap-3 p-4 text-sm font-medium uppercase tracking-wider transition-all border-l-2 border-transparent text-zinc-500 hover:text-zinc-300 hover:bg-zinc-900/50">
            <svg class="w-[18px] h-[18px] shrink-0" fill="none" stroke="currentColor" stroke-width="2"
                viewBox="0 0 24 24">
                <path [attr.d]="iconPath('settings')" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            Configurações
        </a>
    </div>
</aside>
